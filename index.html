<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="OBLAKO — электронное меню лаундж-бара">
  <meta name="theme-color" content="#0d0d0d">
  <title>OBLAKO — Меню</title>
  <link rel="icon" href="image/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/wow.css">
  <link rel="stylesheet" href="css/fun.css">
</head>
<body>

  <button type="button" class="vip-badge" id="vip-badge" aria-label="VIP режим">✦ VIP</button>

  <div class="scroll-progress" id="scroll-progress" aria-hidden="true"></div>

  <div class="splash" id="splash">
    <div class="splash__aurora"></div>
    <div class="splash__inner">
      <img src="image/logo.png" alt="OBLAKO" class="splash__logo">
      <div class="splash__line"></div>
      <p class="splash__tagline">Lounge Bar</p>
    </div>
  </div>

  <div class="aurora" aria-hidden="true">
    <div class="aurora__blob aurora__blob--1"></div>
    <div class="aurora__blob aurora__blob--2"></div>
    <div class="aurora__blob aurora__blob--3"></div>
  </div>

  <canvas class="particles" id="particles" aria-hidden="true"></canvas>
  <div class="cursor-glow" id="cursor-glow" aria-hidden="true"></div>

  <div class="watermark">
    <img src="image/logo.png" alt="" aria-hidden="true">
  </div>

  <header id="header">
    <div class="header-meta">
      <span id="greeting"></span>
      <span class="header-meta__sep">·</span>
      <span id="live-clock"></span>
    </div>
    <div class="logo-img-wrap">
      <img src="image/logo.png" alt="OBLAKO" class="logo-img">
    </div>
    <div class="search-wrap">
      <div class="search-field">
        <input type="text" id="search" placeholder="Поиск блюда..." autocomplete="off">
        <button type="button" class="search-clear" id="search-clear" aria-label="Очистить поиск" hidden>&times;</button>
      </div>
    </div>
    <button type="button" class="rules-access" id="open-rules">Правила заведения</button>
    <div class="view-toggle" id="view-toggle" role="group" aria-label="Вид меню">
      <button type="button" class="view-toggle__btn active" data-view="grid" aria-label="Сетка">
        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="8" height="8" rx="1"/><rect x="13" y="3" width="8" height="8" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/><rect x="13" y="13" width="8" height="8" rx="1"/></svg>
      </button>
      <button type="button" class="view-toggle__btn" data-view="list" aria-label="Список">
        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="4" width="18" height="4" rx="1"/><rect x="3" y="10" width="18" height="4" rx="1"/><rect x="3" y="16" width="18" height="4" rx="1"/></svg>
      </button>
    </div>
  </header>

  <div class="tabs-outer">
    <div class="tabs" id="tabs"></div>
  </div>

  <main>
    <div id="menu-root"></div>
    <div id="rules-root" class="rules-root"></div>
    <div class="empty" id="empty-state">Ничего не найдено</div>
  </main>

  <footer class="site-footer">
    <p class="site-footer__copy">© 2026 OBLAKO — Все права защищены</p>
    <p class="site-footer__dev">
      Разработано
      <span class="site-footer__dev-name">hmeeti</span>
    </p>
  </footer>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <nav class="dock" id="dock" aria-label="Быстрая навигация">
    <button type="button" class="dock__btn" data-action="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1h-5v-6H9v6H4a1 1 0 01-1-1V9.5z"/></svg>
      <span>Меню</span>
    </button>
    <button type="button" class="dock__btn" data-action="categories">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Разделы</span>
    </button>
    <button type="button" class="dock__btn" data-action="rules">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 4h9l3 3v13H6z"/><path d="M15 4v4h4"/><path d="M9 12h6M9 16h6"/></svg>
      <span>Правила</span>
    </button>
    <button type="button" class="dock__btn" data-action="top">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
      <span>Наверх</span>
    </button>
  </nav>

  <script src="js/data.js"></script>
  <script src="js/rules.js"></script>
  <script src="js/app.js"></script>
  <script src="js/effects.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/wow.js"></script>
  <script src="js/fun.js"></script>
</body>
</html>
